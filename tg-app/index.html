<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <!-- Запрещаем масштабирование — это приложение, не сайт -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2AABEE">
  <title>Ana Krista · Таро</title>

  <!-- Telegram Web App SDK — должен быть первым -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Стили -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Корневой контейнер приложения. Экраны рендерятся сюда через app.js -->
  <div id="app"></div>

  <!-- Нижнее меню — всегда в DOM, показывается/скрывается через JS -->
  <nav id="bottom-nav" class="bottom-nav">
    <button class="nav-tab active" data-tab="catalog">
      <span class="nav-tab__icon">🔮</span>
      <span class="nav-tab__label">Каталог</span>
    </button>
    <button class="nav-tab" data-tab="readings">
      <span class="nav-tab__icon">✨</span>
      <span class="nav-tab__label">Расклады</span>
    </button>
    <button class="nav-tab" data-tab="materials">
      <span class="nav-tab__icon">📖</span>
      <span class="nav-tab__label">Материалы</span>
    </button>
    <button class="nav-tab" data-tab="contact">
      <span class="nav-tab__icon">💌</span>
      <span class="nav-tab__label">Связаться</span>
    </button>
  </nav>

  <!-- Данные каталога (загружать до app.js) -->
  <script src="js/data.js"></script>

  <!-- Главная логика -->
  <script src="js/app.js"></script>

</body>
</html>
